<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGP Forms — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .navbar-brand .logo {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .dashboard { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

    .dashboard-header { margin-bottom: 36px; }
    .dashboard-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .dashboard-header p { color: var(--text-muted); margin-top: 4px; font-size: 14px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 36px;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
    }
    .stat-card .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
    .stat-card .stat-value { font-size: 32px; font-weight: 800; margin-top: 6px; color: var(--primary); }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-header h2 { font-size: 16px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

    .search-box { position: relative; }
    .search-box input {
      padding: 9px 14px 9px 36px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; width: 240px;
    }
    .search-box input:focus { border-color: var(--primary); }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

    .forms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .form-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: var(--transition); cursor: pointer; position: relative;
    }
    .form-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,92,231,0.12); }

    .form-card-preview {
      height: 120px; display: flex; align-items: center; justify-content: center;
    }
    .form-card-preview-icon { opacity: 0.15; }

    .form-card-body { padding: 18px 20px; }
    .form-card-body h3 { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .form-card-meta {
      display: flex; align-items: center; gap: 14px;
      font-size: 12px; color: var(--text-muted); margin-top: 10px;
    }
    .form-card-meta span { display: flex; align-items: center; gap: 4px; }

    .form-card-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px;
      opacity: 0; transition: var(--transition); z-index: 2;
    }
    .form-card:hover .form-card-actions { opacity: 1; }
    .form-card-actions button {
      width: 30px; height: 30px; border-radius: 7px;
      background: rgba(15,15,26,0.85); backdrop-filter: blur(10px);
      border: 1px solid var(--border); color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .form-card-actions button:hover { color: #fff; background: var(--primary); border-color: var(--primary); }
    .form-card-actions button.delete-btn:hover { background: var(--danger); border-color: var(--danger); }

    .new-form-card {
      border: 1px dashed var(--border); border-radius: var(--radius-lg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 220px; cursor: pointer; transition: var(--transition); gap: 10px;
    }
    .new-form-card:hover { border-color: var(--primary); background: var(--primary-light); }
    .new-form-card .icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--bg-dark); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: var(--transition);
    }
    .new-form-card:hover .icon { background: var(--primary); border-color: var(--primary); color: #fff; }
    .new-form-card span { font-size: 13px; font-weight: 600; color: var(--text-muted); }

    .empty-state { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
    .empty-state svg { opacity: 0.2; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }

    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .dashboard { padding: 24px 16px; }
      .forms-grid { grid-template-columns: 1fr; }
      .search-box input { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="10" y="3" width="5" height="5" rx="1"/><rect x="3" y="10" width="5" height="5" rx="1"/><rect x="10" y="10" width="5" height="5" rx="1"/></svg>
      </div>
      NGP Forms
    </div>
    <a href="builder.html" class="btn btn-primary" style="text-decoration:none; font-size:13px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Novo formulário
    </a>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header animate-slideUp">
      <h1>Formulários</h1>
      <p>Crie e gerencie seus formulários interativos</p>
    </div>

    <div class="stats animate-slideUp" id="stats"></div>

    <div class="section-header animate-slideUp" style="animation-delay:0.1s">
      <h2>Todos</h2>
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><line x1="10" y1="10" x2="13" y2="13"/></svg>
        <input type="text" placeholder="Buscar..." id="searchInput">
      </div>
    </div>

    <div class="forms-grid animate-slideUp" style="animation-delay:0.15s" id="formsGrid"></div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2>Excluir formulário?</h2>
      <p class="text-secondary" style="font-size:14px; margin-top:8px;">Esta ação não pode ser desfeita. Todas as respostas também serão excluídas.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/storage.js"></script>
  <script>
    // --- SVG Icons ---
    const icons = {
      edit: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2l2 2-7 7H2V9l7-7z"/></svg>`,
      copy: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="8" height="8" rx="1"/><path d="M8 4V2H2v6h2"/></svg>`,
      chart: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="7" width="3" height="5"/><rect x="5" y="4" width="3" height="8"/><rect x="9" y="1" width="3" height="11"/></svg>`,
      link: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 8a3 3 0 004.5.4l2-2a3 3 0 00-4.2-4.2L6 3.5"/><path d="M8 5a3 3 0 00-4.5-.4l-2 2a3 3 0 004.2 4.2L7 9.5"/></svg>`,
      trash: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 3 12 3"/><path d="M10 3V1H3v2"/><path d="M10 3l-.8 9H3.8L3 3"/></svg>`,
      form: `<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="6" y="6" width="36" height="36" rx="4"/><line x1="13" y1="16" x2="35" y2="16"/><line x1="13" y1="24" x2="35" y2="24"/><line x1="13" y1="32" x2="26" y2="32"/></svg>`,
      formEmpty: `<svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="8" y="8" width="48" height="48" rx="6"/><line x1="18" y1="22" x2="46" y2="22"/><line x1="18" y1="32" x2="46" y2="32"/><line x1="18" y1="42" x2="34" y2="42"/></svg>`,
      plus: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/></svg>`,
      questions: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="5"/><line x1="6" y1="8" x2="6" y2="8.5"/><path d="M4.5 4.5a1.5 1.5 0 013 .5c0 1-1.5 1.5-1.5 2"/></svg>`,
      responses: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 2H2a1 1 0 00-1 1v6a1 1 0 001 1h2l2 2 2-2h2a1 1 0 001-1V3a1 1 0 00-1-1z"/></svg>`,
      calendar: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="2" width="10" height="9" rx="1"/><line x1="1" y1="5" x2="11" y2="5"/><line x1="4" y1="1" x2="4" y2="3"/><line x1="8" y1="1" x2="8" y2="3"/></svg>`,
    };

    const formsGrid = document.getElementById('formsGrid');
    const searchInput = document.getElementById('searchInput');
    const deleteModal = document.getElementById('deleteModal');
    let deleteFormId = null;

    function init() {
      renderStats();
      renderForms();
      searchInput.addEventListener('input', () => renderForms(searchInput.value));
    }

    function renderStats() {
      const forms = Storage.getForms();
      const allResponses = Storage.getAllResponses();
      let totalResponses = 0;
      Object.values(allResponses).forEach(r => totalResponses += r.length);
      const publishedCount = forms.filter(f => f.published).length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-label">Formulários</div><div class="stat-value">${forms.length}</div></div>
        <div class="stat-card"><div class="stat-label">Publicados</div><div class="stat-value">${publishedCount}</div></div>
        <div class="stat-card"><div class="stat-label">Respostas</div><div class="stat-value">${totalResponses}</div></div>
      `;
    }

    function renderForms(filter = '') {
      let forms = Storage.getForms();
      if (filter) forms = forms.filter(f => f.title.toLowerCase().includes(filter.toLowerCase()));
      forms.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      const palette = ['#6C5CE7','#0984E3','#00B894','#E17055','#FDCB6E','#E84393','#00CEC9'];

      let html = `
        <div class="new-form-card" onclick="createNewForm()">
          <div class="icon">${icons.plus}</div>
          <span>Novo formulário</span>
        </div>
      `;

      if (forms.length === 0 && filter) {
        html += `<div class="empty-state">${icons.formEmpty}<h3>Nenhum resultado</h3><p>Nenhum formulário encontrado para "${esc(filter)}"</p></div>`;
      } else if (forms.length === 0) {
        html += `<div class="empty-state">${icons.formEmpty}<h3>Nenhum formulário ainda</h3><p>Crie seu primeiro formulário</p><button class="btn btn-primary" style="margin-top:20px;" onclick="createNewForm()">Criar formulário</button></div>`;
      }

      forms.forEach((form, i) => {
        const color = form.theme?.primaryColor || palette[i % palette.length];
        const responseCount = Storage.getResponseCount(form.id);
        const fieldCount = form.fields?.length || 0;
        const date = new Date(form.updatedAt).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });

        html += `
          <div class="form-card" onclick="editForm('${form.id}')">
            <div class="form-card-actions" onclick="event.stopPropagation()">
              <button title="Editar" onclick="editForm('${form.id}')">${icons.edit}</button>
              <button title="Duplicar" onclick="duplicateForm('${form.id}')">${icons.copy}</button>
              <button title="Respostas" onclick="viewResults('${form.id}')">${icons.chart}</button>
              <button title="Compartilhar" onclick="shareForm('${form.id}')">${icons.link}</button>
              <button class="delete-btn" title="Excluir" onclick="confirmDelete('${form.id}')">${icons.trash}</button>
            </div>
            <div class="form-card-preview" style="background:${color}18;">
              <div class="form-card-preview-icon" style="color:${color};">${icons.form}</div>
            </div>
            <div class="form-card-body">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                <h3>${esc(form.title)}</h3>
              </div>
              <span class="badge ${form.published ? 'badge-success' : 'badge-warning'}">${form.published ? 'Publicado' : 'Rascunho'}</span>
              <div class="form-card-meta">
                <span>${icons.questions} ${fieldCount} ${fieldCount === 1 ? 'pergunta' : 'perguntas'}</span>
                <span>${icons.responses} ${responseCount} ${responseCount === 1 ? 'resposta' : 'respostas'}</span>
                <span>${icons.calendar} ${date}</span>
              </div>
            </div>
          </div>
        `;
      });

      formsGrid.innerHTML = html;
    }

    function createNewForm() {
      const form = Storage.createBlankForm();
      Storage.saveForm(form);
      window.location.href = `builder.html?id=${form.id}`;
    }
    function editForm(id) { window.location.href = `builder.html?id=${id}`; }
    function viewResults(id) { window.location.href = `results.html?id=${id}`; }
    function duplicateForm(id) {
      Storage.duplicateForm(id);
      renderStats(); renderForms(searchInput.value);
      showToast('Formulário duplicado', 'success');
    }
    function shareForm(id) {
      const url = new URL('view.html', window.location.href);
      url.searchParams.set('id', id);
      navigator.clipboard.writeText(url.toString())
        .then(() => showToast('Link copiado', 'success'))
        .catch(() => prompt('Copie o link:', url.toString()));
    }
    function confirmDelete(id) {
      deleteFormId = id;
      deleteModal.classList.add('active');
      document.getElementById('confirmDeleteBtn').onclick = () => {
        Storage.deleteForm(deleteFormId);
        closeDeleteModal();
        renderStats(); renderForms(searchInput.value);
        showToast('Formulário excluído', 'info');
      };
    }
    function closeDeleteModal() { deleteModal.classList.remove('active'); deleteFormId = null; }
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`; t.textContent = msg;
      c.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
    function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    deleteModal.addEventListener('click', e => { if (e.target === deleteModal) closeDeleteModal(); });
    init();
  </script>
</body>
</html>
